<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="profile-section" id="profile-section">
            <!-- Profile will be loaded dynamically -->
        </div>
        
        <div class="language-selector">
            <button class="lang-btn" data-lang="en">English</button>
            <button class="lang-btn" data-lang="zh">中文</button>
        </div>
        
        <nav class="nav-menu">
            <a href="#about" class="nav-block nav-about" data-chapter="about">
                <span data-en="About Me" data-zh="自我介绍">About Me</span>
            </a>
            <a href="#experiences" class="nav-block nav-experiences" data-chapter="experiences">
                <span data-en="Experiences" data-zh="个人经历">Experiences</span>
            </a>
            <a href="#demos" class="nav-block nav-skills" data-chapter="demos">
                <span data-en="Demos" data-zh="技术演示">Demos</span>
            </a>
            <a href="#publications" class="nav-block nav-publications" data-chapter="publications">
                <span data-en="Publications" data-zh="发表文章">Publications</span>
            </a>
            <a href="#contact" class="nav-block nav-contact" data-chapter="contact">
                <span data-en="Contact & More" data-zh="联系方式">Contact & More</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Content will be loaded dynamically -->
        <section id="about" class="chapter active"></section>
        <section id="experiences" class="chapter"></section>
        <section id="demos" class="chapter"></section>
        <section id="publications" class="chapter"></section>
        <section id="contact" class="chapter"></section>
    </main>

    <script src="script.js"></script>
</body>
</html>
